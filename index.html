<body>

  <script>
    (function() {
      window.soBody = document.body;
      window.soBodyOriginalStyleHeight = '';
      window.soBodyOriginalStyleOverflow = '';

      window.soSubmit = function(el) {
        if (!soFormValidate(el)) {
          return false;
        }
        const behaviour = el.getAttribute('data-behaviour');
        window.soBody = document.getElementsByTagName("body")[0];
        window.soBodyOriginalStyleHeight = window.soBody.style.height;
        window.soBodyOriginalStyleOverflow = window.soBody.style.overflow;
        
        const element = document.createElement("input");
        element.setAttribute("type", "hidden");
        element.setAttribute("name", "referrer");
        element.setAttribute("value", window.location.href);
        el.appendChild(element);
        
        if (behaviour === 'new_tab') return true;
        if (behaviour === 'modal') return soSubmitModal(el);
        if (behaviour === 'be_in_touch') return soSubmitBeInTouch(el);
        if (behaviour === 'redirect') return soSubmitRedirect(el);
        return true;
      };

      window.soFormValidate = function(el) {
        const domain = el.querySelector('input[name="domain"]');
        const email = el.querySelector('input[name="email"]');
        const phone = el.querySelector('input[name="phone"]');
        const firstName = el.querySelector('input[name="first_name"]');
        const lastName = el.querySelector('input[name="last_name"]');
        const custom = el.querySelector('input[name="custom_field"]');
        const consent = el.querySelector('input[name="consent"]');

        if (!domain || domain.value.trim().length === 0) {
          alert(domain ? domain.getAttribute("data-validation") : "Website URL is required.");
          return false;
        }
        let domainValue = domain.value.trim().replace(/\/$/, "");
        domain.value = domainValue;
        const domainPattern = /^(https?:\/\/)?[a-z\d\-]{1,62}\.[a-z\d\-]{1,62}(\.[a-z\d\-]{1,62})*$/i;
        if (!domainPattern.test(domainValue)) {
          alert(domain.getAttribute("data-validation"));
          return false;
        }
        if (firstName && firstName.value.trim().length === 0) {
          alert(firstName.getAttribute("data-validation"));
          return false;
        }
        if (lastName && lastName.value.trim().length === 0) {
          alert(lastName.getAttribute("data-validation"));
          return false;
        }
        if (email) {
          if (email.value.trim().length === 0) {
            alert(email.getAttribute("data-validation"));
            return false;
          }
          const emailRegex = /^(([^<>()[\]\.,;:\s@\"]+(\.[^<>()[\]\.,;:\s@\"]+)*)|(\".+\"))@(([^<>()[\]\.,;:\s@\"]+\.)+[^<>()[\]\.,;:\s@\"]{2,})$/i;
          if (!emailRegex.test(email.value.trim())) {
            alert(email.getAttribute("data-validation"));
            return false;
          }
        }
        if (phone && phone.value.trim().length < 7) {
          alert(phone.getAttribute("data-validation"));
          return false;
        }
        if (custom && custom.value.trim().length === 0) {
          alert(custom.getAttribute("data-validation"));
          return false;
        }
        if (consent && consent.checked === false) {
          alert(consent.getAttribute("data-validation"));
          return false;
        }
        setTimeout(function() {
          el.reset();
        }, 50);
        return true;
      };

      window.soSubmitModal = function(el) {
        const existingWrapper = document.getElementById('so-modal-wrapper');
        if (existingWrapper) existingWrapper.remove();
        
        const modalWrapper = document.createElement("div");
        modalWrapper.setAttribute('id', 'so-modal-wrapper');
        modalWrapper.style.position = 'absolute';
        modalWrapper.style.top = '0';
        modalWrapper.style.left = '0';
        modalWrapper.style.width = '100%';
        modalWrapper.style.zIndex = '9999999';
        
        const htmlContent = `
          <style>
            #so-widget-modal-overlay {
              position:fixed; top:0; left:0; width:100%; height:100%;
              background:rgba(0,0,0,0.8); backdrop-filter:blur(15px);
              display:none; opacity:0; transition:opacity 0.3s; z-index:9999998;
            }
            #so-widget-modal-content {
              position:relative; width:88%; max-width:1250px; height:85%;
              margin:70px auto 0; background:rgba(15,23,42,0.95);
              backdrop-filter:blur(24px); border-radius:2.5rem;
              border:1px solid rgba(255,255,255,0.2);
              box-shadow:0 40px 60px #00000080; display:flex; flex-direction:column;
            }
            @media (max-width:650px) {
              #so-widget-modal-content { width:96%; height:90%; margin-top:45px; }
            }
            #iframe-wrapper { flex:1; border-radius:0 0 2rem 2rem; overflow:hidden; }
            #iframe-wrapper iframe { width:100%; height:100%; border:none; }
            .modal-header {
              display:flex; align-items:center; justify-content:space-between;
              padding:1.2rem 2rem; background:rgba(255,255,255,0.05);
              border-bottom:1px solid rgba(255,255,255,0.15);
              border-radius:2rem 2rem 0 0;
            }
            #so-widget-modal-title { font-weight:600; color:#f8fafc; font-size:1.4rem; }
            .close-btn {
              cursor:pointer; font-size:1.8rem; color:#cbd5e1;
              width:38px; height:38px; display:flex; align-items:center;
              justify-content:center; border-radius:50%; background:rgba(255,255,255,0.1);
            }
            .close-btn:hover { background:#ef4444; color:white; }
          </style>
          <div id="so-widget-modal-overlay">
            <div id="so-widget-modal-content">
              <div class="modal-header">
                <span id="so-widget-modal-title"></span>
                <span class="close-btn" onclick="closeSoModal()"><i class="fas fa-times"></i></span>
              </div>
              <div id="iframe-wrapper">
                <iframe name="so-iframe" id="so-iframe" scrolling="yes"></iframe>
              </div>
            </div>
          </div>
        `;
        
        modalWrapper.innerHTML = htmlContent;
        document.body.appendChild(modalWrapper);
        
        const domainInput = el.querySelector('input[name="domain"]');
        const domainValue = domainInput ? domainInput.value : '';
        document.getElementById('so-widget-modal-title').innerText = 
          (el.getAttribute("data-title") || "Report for ") + domainValue;
        
        const overlay = document.getElementById('so-widget-modal-overlay');
        overlay.style.display = 'block';
        document.body.style.height = '100%';
        document.body.style.overflow = 'hidden';
        setTimeout(() => { overlay.style.opacity = '1'; }, 40);
        return true;
      };

      window.soSubmitBeInTouch = function(el) {
        const iframe = document.createElement("iframe");
        const element = document.createElement("input");
        element.setAttribute("type", "hidden");
        element.setAttribute("name", "be_in_touch");
        element.setAttribute("value", "1");
        el.appendChild(element);
        iframe.style.cssText = 'position:absolute; bottom:0; left:0; width:1px; height:1px; border:none;';
        document.body.appendChild(iframe);
        alert(el.getAttribute("data-touch") || "We'll be in touch!");
        return true;
      };

      window.soSubmitRedirect = function(el) {
        el.removeAttribute('target');
        return true;
      };

      window.closeSoModal = function() {
        const overlay = document.getElementById('so-widget-modal-overlay');
        if (!overlay) return;
        overlay.style.opacity = '0';
        const wrapper = document.getElementById('so-modal-wrapper');
        setTimeout(() => {
          if (wrapper) wrapper.remove();
          document.body.style.height = window.soBodyOriginalStyleHeight || '';
          document.body.style.overflow = window.soBodyOriginalStyleOverflow || '';
          if (overlay) overlay.style.display = 'none';
        }, 300);
      };
    })();
  </script>
</body>
